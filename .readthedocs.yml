 version: 2

 build:
   os: "ubuntu-24.04"
   tools:
     python: "3.13"
   commands:
    - python clone_directories_to_docs.py
 jobs:
    build:
      - pydoc-markdown --build --site-dir "$READTHEDOCS_OUTPUT/html"
 python:
   install:
       - requirements: docs/requirements.txt
       
 mkdocs:
   configuration: mkdocs.yml
